<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f2ec">
  <title>Pathway not found — Dogshit Duo Devices</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --paper: #f4f2ec;
      --carbon: #111a1e;
      --steel: #93a4aa;
      --teal: #35666b;
      --orange: #e05235;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      border-left: 5px solid var(--teal);
      background: var(--paper);
      color: var(--carbon);
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
    }

    main {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      padding-inline: clamp(1rem, 5vw, 4rem);
    }

    .rail {
      display: flex;
      align-items: center;
      min-height: 4.25rem;
      border-bottom: 1px solid var(--steel);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.11em;
    }

    .message {
      align-self: center;
      max-width: 70rem;
      padding-block: 4rem;
    }

    .code {
      margin: 0 0 1.5rem;
      color: var(--teal);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      font-weight: 750;
      letter-spacing: 0.12em;
    }

    h1 {
      max-width: 10ch;
      margin: 0 0 2.5rem;
      font-family: "Arial Narrow", "Helvetica Neue Condensed", Arial, sans-serif;
      font-size: clamp(3.5rem, 10vw, 8rem);
      letter-spacing: -0.055em;
      line-height: 0.9;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0.75rem 1rem;
      border-left: 5px solid var(--orange);
      background: var(--carbon);
      color: var(--paper);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      font-weight: 750;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    a:focus-visible {
      outline: 3px solid var(--orange);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <div class="rail">DDD / COMMERCIALIZATION PRACTICE</div>
    <section class="message">
      <p class="code">404 / PATHWAY FAILURE</p>
      <h1>This pathway does not exist.</h1>
      <a href="./">Return to the field document</a>
    </section>
  </main>
</body>
</html>
