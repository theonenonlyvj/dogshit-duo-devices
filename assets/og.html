<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>DDD / Commercialization Practice</title>
  <style>
    @font-face {
      font-family: "DDD Display";
      font-style: normal;
      font-weight: 800;
      font-display: swap;
      src: url("./fonts/DDD-Display.woff2") format("woff2");
    }

    @font-face {
      font-family: "DDD Text";
      font-style: normal;
      font-weight: 200 800;
      font-display: swap;
      src: url("./fonts/DDD-Text.woff2") format("woff2");
    }

    :root {
      --paper: #f4f2ec;
      --carbon: #111a1e;
      --steel: #93a4aa;
      --teal: #35666b;
      --orange: #e05235;
      --umber: #3b2a24;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--carbon);
    }

    body {
      position: relative;
      border-left: 8px solid var(--teal);
      font-family: "DDD Text", "Helvetica Neue", Arial, sans-serif;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 44px 44px auto auto;
      width: 108px;
      height: 12px;
      background: var(--orange);
    }

    main {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100%;
      padding: 42px 60px 48px;
    }

    .rail {
      height: 42px;
      border-bottom: 2px solid var(--steel);
    }

    .hero {
      position: relative;
      z-index: 1;
      align-self: center;
    }

    .brand {
      margin: 0 0 22px;
      color: var(--teal);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 20px;
      font-weight: 750;
      letter-spacing: 0.11em;
    }

    h1 {
      margin: 0;
      font-family: "DDD Display", "Arial Narrow", Arial, sans-serif;
      font-size: 92px;
      font-stretch: condensed;
      font-weight: 800;
      letter-spacing: -0.018em;
      line-height: 0.88;
      white-space: nowrap;
    }

    h1 span {
      color: var(--orange);
    }

    .pathway-diagram {
      position: absolute;
      z-index: 0;
      top: 130px;
      right: 60px;
      display: grid;
      grid-template-columns: repeat(3, 92px);
      height: 72px;
    }

    .pathway-diagram::after {
      content: "";
      position: absolute;
      top: 34px;
      left: 18px;
      right: 18px;
      border-top: 4px solid var(--orange);
    }

    .pathway-diagram span {
      position: relative;
      border: 2px solid var(--steel);
    }

    .pathway-diagram span + span {
      border-left: 0;
    }

    .pathway-diagram span::after {
      content: "";
      position: absolute;
      z-index: 1;
      top: 27px;
      left: 35px;
      width: 12px;
      height: 12px;
      border: 3px solid var(--teal);
      background: var(--paper);
      border-radius: 50%;
    }

    .closing {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 0;
      color: var(--umber);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 21px;
      font-weight: 750;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .closing::before {
      content: "";
      width: 72px;
      height: 6px;
      background: var(--orange);
    }
  </style>
</head>
<body>
  <main>
    <div class="rail" aria-hidden="true"></div>
    <div class="pathway-diagram" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="hero">
      <p class="brand">DDD / COMMERCIALIZATION PRACTICE</p>
      <h1>INSPECT THE PATHWAY.<br><span>NOT JUST THE FUNNEL.</span></h1>
    </div>
    <p class="closing">Serious operators. Unfortunate name.</p>
  </main>
</body>
</html>
