<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Dogshit Duo Devices social card</title>
  <style>
    @font-face {
      font-family: "DDD Display";
      font-style: normal;
      font-weight: 800;
      font-display: swap;
      src: url("./fonts/DDD-Display.woff2") format("woff2");
    }

    @font-face {
      font-family: "DDD Text";
      font-style: normal;
      font-weight: 200 800;
      font-display: swap;
      src: url("./fonts/DDD-Text.woff2") format("woff2");
    }

    :root {
      --paper: #f4f2ec;
      --carbon: #111a1e;
      --steel: #93a4aa;
      --teal: #35666b;
      --orange: #e05235;
      --umber: #3b2a24;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--carbon);
    }

    body {
      position: relative;
      border-left: 8px solid var(--teal);
      font-family: "DDD Text", "Helvetica Neue", Arial, sans-serif;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 44px 44px auto auto;
      width: 108px;
      height: 12px;
      background: var(--orange);
    }

    main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100%;
      padding: 42px 60px 48px;
    }

    .rail {
      height: 42px;
      border-bottom: 2px solid var(--steel);
    }

    .hero {
      align-self: center;
    }

    h1 {
      margin: 0 0 30px;
      font-family: "DDD Display", "Arial Narrow", Arial, sans-serif;
      font-size: 106px;
      font-stretch: condensed;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 0.9;
      white-space: nowrap;
    }

    .positioning {
      max-width: 950px;
      margin: 0;
      font-size: 34px;
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1.12;
      white-space: nowrap;
    }

    .closing {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 0;
      color: var(--umber);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 21px;
      font-weight: 750;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .closing::before {
      content: "";
      width: 72px;
      height: 6px;
      background: var(--orange);
    }
  </style>
</head>
<body>
  <main>
    <div class="rail" aria-hidden="true"></div>
    <div class="hero">
      <h1>DOGSHIT DUO DEVICES</h1>
      <p class="positioning">Clinical reality. Engineering discipline. Commercial system.</p>
    </div>
    <p class="closing">Serious operators. Unfortunate name.</p>
  </main>
</body>
</html>
